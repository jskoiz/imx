on:
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      - 'v*'
    paths:
      - '.github/workflows/rust-standalone-preview.yml'
      - '**/*.rs'
      - '**/Cargo.toml'
      - 'Cargo.lock'
      - 'fuzz/**'
      - 'scripts/**'
      - 'packaging/**'
      - 'tests/**'
      - 'README.md'
      - 'COMPATIBILITY.md'
      - 'RELEASE_NOTES.md'
      - 'PRODUCTION_READINESS.md'
  pull_request:
    branches:
      - main

permissions:
  contents: read

name: Rust Standalone Preview
jobs:
  preview:
    name: Developer preview gates
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Check hosted Apple Actions guard
        run: |
          set -euo pipefail
          bash scripts/check-no-hosted-apple-actions.sh

      - name: Smoke Homebrew formula generator
        run: |
          set -euo pipefail
          bash scripts/smoke-homebrew-formula-generator.sh

      - name: Prepare Rust toolchain
        run: |
          set -euo pipefail
          rustc --version
          cargo --version
          rustup component add clippy rustfmt
          rustup toolchain install nightly --profile minimal

      - name: Install ImageMagick oracle build dependencies
        run: |
          set -euo pipefail
          export DEBIAN_FRONTEND=noninteractive
          sudo apt-get update -y
          sudo apt-get install -y autoconf automake gcc g++ git libtool make pkg-config

      - name: Install fuzz tooling
        run: |
          set -euo pipefail
          cargo install cargo-fuzz --locked

      - name: Build ImageMagick oracle for differential tests
        run: |
          set -euo pipefail
          git clone --depth=1 https://github.com/ImageMagick/ImageMagick.git target/imagemagick-oracle
          cd target/imagemagick-oracle
          ./configure --without-perl --without-magick-plus-plus --without-modules
          make -j2 utilities/magick

      - name: Run standalone release gates
        run: |
          set -euo pipefail
          IMAGEMAGICK_MAGICK="$GITHUB_WORKSPACE/target/imagemagick-oracle/utilities/magick" \
            IMX_REQUIRE_ORACLE=1 \
            IMX_BENCH_ITERATIONS=3 \
            IMX_FUZZ_MAX_TOTAL_TIME=2 \
            bash scripts/ci.sh

      - name: Generate benchmark evidence
        run: |
          set -euo pipefail
          IMAGEMAGICK_MAGICK="$GITHUB_WORKSPACE/target/imagemagick-oracle/utilities/magick" \
            IMX_BENCH_ITERATIONS=3 \
            bash scripts/bench-release.sh

      - name: Check benchmark regressions
        run: |
          set -euo pipefail
            IMAGEMAGICK_MAGICK="$GITHUB_WORKSPACE/target/imagemagick-oracle/utilities/magick" \
            IMX_BENCH_BASE_REF=v0.5.0 \
            IMX_BENCH_ITERATIONS=10 \
            bash scripts/bench-regression.sh

      - name: Package standalone preview
        run: |
          set -euo pipefail
          bash scripts/package-release.sh

      - name: Install Linux arm64 packaging dependencies
        run: |
          set -euo pipefail
          sudo apt-get install -y binutils-aarch64-linux-gnu gcc-aarch64-linux-gnu libc6-arm64-cross libgcc-s1-arm64-cross qemu-user
          rustup target add aarch64-unknown-linux-gnu

      - name: Package Linux arm64 preview
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
          IMX_ARTIFACT_DIR: target/release-artifacts-linux-arm64
          IMX_EXPECTED_TARGET: aarch64-unknown-linux-gnu
          IMX_LINKAGE_COMMAND: aarch64-linux-gnu-readelf -d
          IMX_PACKAGE_RUNNER: qemu-aarch64 -L /usr/aarch64-linux-gnu
          IMX_PACKAGE_TARGET: aarch64-unknown-linux-gnu
        run: |
          set -euo pipefail
          bash scripts/package-release.sh

      - name: Verify Linux arm64 archive preview
        env:
          IMX_LINKAGE_COMMAND: aarch64-linux-gnu-readelf -d
          IMX_RELEASE_DIR: target/release-artifacts-linux-arm64
          IMX_RELEASE_RUNNER: qemu-aarch64 -L /usr/aarch64-linux-gnu
          IMX_RELEASE_TARGET: aarch64-unknown-linux-gnu
        run: |
          set -euo pipefail
          bash scripts/verify-release-archive.sh

      - name: Verify fresh checkout install
        run: |
          set -euo pipefail
          IMX_INSTALL_REPO_URL="$GITHUB_SERVER_URL/$GITHUB_REPOSITORY.git" \
            IMX_INSTALL_REVISION="$GITHUB_SHA" \
            bash scripts/verify-install.sh

      - name: Verify standalone binary does not link ImageMagick
        run: |
          set -euo pipefail
          ldd target/debug/imx
          ldd target/release/imx
          ! ldd target/debug/imx | grep -E 'Magick(Core|Wand)|ImageMagick'
          ! ldd target/release/imx | grep -E 'Magick(Core|Wand)|ImageMagick'

      - name: Generate conformance report
        run: |
          set -euo pipefail
          bash scripts/generate-conformance-report.sh

      - name: Upload standalone preview evidence
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: rust-standalone-preview-evidence
          path: |
            target/generated-fixtures
            target/differential-corpus-*
            target/fuzz-runs
            target/install-verify
            target/release-bench-*
            target/bench-regression-*
            target/release-artifacts
            target/release-artifacts-linux-arm64
            target/release-archive-smoke/aarch64-unknown-linux-gnu
            target/conformance

  package:
    name: Package release artifact (${{ matrix.name }})
    needs: preview
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-x86_64
            runner: ubuntu-24.04
            target: x86_64-unknown-linux-gnu
            package_runner: ""
            linkage_command: ""
          - name: linux-arm64
            runner: ubuntu-24.04
            target: aarch64-unknown-linux-gnu
            package_runner: qemu-aarch64 -L /usr/aarch64-linux-gnu
            linkage_command: aarch64-linux-gnu-readelf -d

    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Check hosted Apple Actions guard
        run: |
          set -euo pipefail
          bash scripts/check-no-hosted-apple-actions.sh

      - name: Install Linux arm64 packaging dependencies
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          set -euo pipefail
          sudo apt-get update -y
          sudo apt-get install -y binutils-aarch64-linux-gnu gcc-aarch64-linux-gnu libc6-arm64-cross libgcc-s1-arm64-cross qemu-user
          rustup target add aarch64-unknown-linux-gnu

      - name: Package standalone preview
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
          IMX_EXPECTED_TARGET: ${{ matrix.target }}
          IMX_LINKAGE_COMMAND: ${{ matrix.linkage_command }}
          IMX_PACKAGE_RUNNER: ${{ matrix.package_runner }}
          IMX_PACKAGE_TARGET: ${{ matrix.target }}
        run: |
          set -euo pipefail
          bash scripts/package-release.sh

      - name: Verify standalone binary does not link ImageMagick
        run: |
          set -euo pipefail
          cat target/release-artifacts/linkage-${{ matrix.target }}.txt
          ! grep -E 'Magick(Core|Wand)|ImageMagick' target/release-artifacts/linkage-${{ matrix.target }}.txt

      - name: Upload release artifact
        uses: actions/upload-artifact@v7
        with:
          name: release-artifacts-${{ matrix.name }}
          path: target/release-artifacts/*.tar.gz

  release:
    name: Publish release artifacts
    needs: package
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-24.04
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Check hosted Apple Actions guard
        run: |
          set -euo pipefail
          bash scripts/check-no-hosted-apple-actions.sh

      - name: Download packaged release artifacts
        uses: actions/download-artifact@v7
        with:
          pattern: release-artifacts-*
          path: target/release-upload
          merge-multiple: true

      - name: Download preview evidence
        uses: actions/download-artifact@v7
        with:
          name: rust-standalone-preview-evidence
          path: target/release-evidence

      - name: Generate aggregate checksums
        run: |
          set -euo pipefail
          cd target/release-upload
          shasum -a 256 *.tar.gz > SHA256SUMS

      - name: Generate Homebrew tap formula
        run: |
          set -euo pipefail
          bash scripts/generate-homebrew-formula.sh \
            "$GITHUB_REF_NAME" \
            target/release-upload/SHA256SUMS \
            target/release-upload/imx.rb
          ruby -c target/release-upload/imx.rb

      - name: Generate release conformance report
        run: |
          set -euo pipefail
          IMX_VERSION="$GITHUB_REF_NAME" \
            IMX_CONFORMANCE_EVIDENCE_DIR=target/release-evidence \
            IMX_RELEASE_DIR=target/release-upload \
            IMX_CONFORMANCE_OUT=target/release-conformance \
            bash scripts/generate-conformance-report.sh
          cp target/release-conformance/CONFORMANCE_REPORT.md target/release-upload/CONFORMANCE_REPORT.md
          cp target/release-conformance/conformance-summary.json target/release-upload/conformance-summary.json

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            gh release edit "$GITHUB_REF_NAME" \
              --target "$GITHUB_SHA" \
              --title "IMX Developer Preview $GITHUB_REF_NAME" \
              --notes-file RELEASE_NOTES.md
            gh release upload "$GITHUB_REF_NAME" target/release-upload/* --clobber
          else
            gh release create "$GITHUB_REF_NAME" target/release-upload/* \
              --title "IMX Developer Preview $GITHUB_REF_NAME" \
              --notes-file RELEASE_NOTES.md \
              --target "$GITHUB_SHA" \
              --verify-tag
          fi

  release-archive-smoke:
    name: Smoke published release archive (${{ matrix.name }})
    needs: release
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-x86_64
            runner: ubuntu-24.04
            target: x86_64-unknown-linux-gnu
            release_runner: ""
            linkage_command: ""
          - name: linux-arm64
            runner: ubuntu-24.04
            target: aarch64-unknown-linux-gnu
            release_runner: qemu-aarch64 -L /usr/aarch64-linux-gnu
            linkage_command: aarch64-linux-gnu-readelf -d

    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Check hosted Apple Actions guard
        run: |
          set -euo pipefail
          bash scripts/check-no-hosted-apple-actions.sh

      - name: Install Linux arm64 smoke dependencies
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          set -euo pipefail
          sudo apt-get update -y
          sudo apt-get install -y binutils-aarch64-linux-gnu gcc-aarch64-linux-gnu libc6-arm64-cross libgcc-s1-arm64-cross qemu-user
          libgcc_path="$(aarch64-linux-gnu-gcc -print-file-name=libgcc_s.so.1)"
          sudo cp -v "$libgcc_path" /usr/aarch64-linux-gnu/lib/

      - name: Verify published release archive
        env:
          IMX_LINKAGE_COMMAND: ${{ matrix.linkage_command }}
          IMX_RELEASE_RUNNER: ${{ matrix.release_runner }}
        run: |
          set -euo pipefail
          IMX_REPO="$GITHUB_REPOSITORY" \
            IMX_VERSION="$GITHUB_REF_NAME" \
            IMX_RELEASE_TARGET="${{ matrix.target }}" \
            bash scripts/verify-release-archive.sh

      - name: Upload release archive smoke evidence
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: release-archive-smoke-${{ matrix.name }}
          path: target/release-archive-smoke/${{ matrix.target }}
